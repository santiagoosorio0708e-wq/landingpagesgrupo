<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design, Create, Passion</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&family=Courier+Prime:wght@400;700&family=Roboto+Slab:wght@700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="CSS/style.css" />
</head>
<body>
  <main class="layout">
    <section class="hero">
      <img src="media/Image left.png" alt="Fondo abstracto" class="hero__bg" />
      <div class="hero__shade"></div>

      <div class="hero__content">
        <h1>Design,create,<br />and be passionate</h1>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Cursus imperdiet sed idt.</p>
        <a href="#" class="btn">Get started</a>
      </div>
    </section>

    <section class="right">
      <div class="right__meta">
        <span class="num">01</span>
        <span class="label">Discover the world</span>
      </div>

      <img src="media/Image right.png" alt="Computador retro" class="right__img" />
    </section>

    <section class="thumbs">
      <article class="thumb">
        <div class="thumb__meta">
          <span class="num">02</span>
          <span class="label">Go with your heart</span>
        </div>
        <img src="media/Image bottom left - left.png" alt="Imagen 02" />
      </article>

      <article class="thumb">
        <div class="thumb__meta">
          <span class="num">03</span>
          <span class="label">Live a full live</span>
        </div>
        <img src="media/right tikiright.png" alt="Imagen 03" />
      </article>
    </section>
  </main>
</body>
</html>
