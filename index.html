<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Principal</title>
    <style>
      :root {
        --bg-1: #f7f2e8;
        --bg-2: #e9ddc5;
        --panel: #ffffff;
        --text: #2f2a22;
        --accent: #9a5f2c;
        --accent-2: #7b481e;
        --error: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background: linear-gradient(145deg, var(--bg-1), var(--bg-2));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(720px, 100%);
        background: var(--panel);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
      }

      h1 {
        margin: 0 0 8px;
      }

      p {
        margin: 0 0 20px;
      }

      .form {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      input {
        flex: 1 1 260px;
        border: 2px solid #dfd3bc;
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 1rem;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 12px 18px;
        font-size: 1rem;
        cursor: pointer;
        color: #fff;
        background: var(--accent);
      }

      button:hover {
        background: var(--accent-2);
      }

      #msg {
        min-height: 22px;
        margin: 10px 2px 0;
        font-size: 0.95rem;
      }

      .error {
        color: var(--error);
      }

      .links {
        margin: 20px 0 0;
        padding: 0;
        list-style: none;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .links a {
        display: inline-block;
        text-decoration: none;
        color: var(--accent-2);
        border: 1px solid #d6c1a0;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 0.92rem;
      }

      .links a:hover {
        background: #f5ecde;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Menu Principal</h1>
      <p>Escribe el numero de pagina (carpeta) para abrirla.</p>

      <form class="form" id="go-form">
        <input
          id="page-number"
          type="number"
          inputmode="numeric"
          min="1"
          step="1"
          placeholder="Ejemplo: 14"
          required
        />
        <button type="submit">Abrir pagina</button>
      </form>

      <div id="msg" aria-live="polite"></div>

      <ul class="links" id="quick-links"></ul>
    </main>

    <script>
      const pages = {
        3: "3/index.html",
        4: "4/index.html",
        6: "6/Pagina6.html",
        10: "10/index.html",
        11: "11/index.html",
        12: "12/index.html",
        14: "14/Pagina14.html",
        15: "15/index.html",
        22: "22/index.html",
        33: "33/Pagina33.html",
        38: "38/Pagina38.html",
        40: "40/Pagina40.html",
        41: "41/index.html",
        45: "45/index.html",
        50: "50/index.html",
      };

      const form = document.getElementById("go-form");
      const input = document.getElementById("page-number");
      const msg = document.getElementById("msg");
      const linksContainer = document.getElementById("quick-links");

      const sortedNumbers = Object.keys(pages)
        .map(Number)
        .sort((a, b) => a - b);

      sortedNumbers.forEach((num) => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = pages[num];
        a.textContent = `Pagina ${num}`;
        li.appendChild(a);
        linksContainer.appendChild(li);
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const pageNumber = Number(input.value.trim());
        const target = pages[pageNumber];

        if (!target) {
          msg.textContent =
            "Ese numero no existe. Usa uno de los disponibles abajo.";
          msg.className = "error";
          return;
        }

        window.location.href = target;
      });
    </script>
  </body>
</html>
